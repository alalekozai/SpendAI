{% extends "base.html" %}
{% block title %}Edit Expense — SpendAI{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Edit Expense</h1>
            <p class="auth-subtitle">Update your expense details</p>
        </div>

        <div class="auth-card">
            <form method="POST" action="{{ url_for('edit_expense', id=expense.id) }}">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="form-input"
                        placeholder="e.g. Groceries"
                        maxlength="100"
                        value="{{ form['title'] or '' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input
                        type="number"
                        id="amount"
                        name="amount"
                        class="form-input"
                        placeholder="0.00"
                        step="0.01"
                        min="0.01"
                        value="{{ form['amount'] or '' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled>Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if form['category'] == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input
                        type="date"
                        id="date"
                        name="date"
                        class="form-input"
                        value="{{ form['date'] or '' }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="description">Description <span class="form-label-hint">(optional)</span></label>
                    <input
                        type="text"
                        id="description"
                        name="description"
                        class="form-input"
                        placeholder="e.g. Lunch with team"
                        maxlength="200"
                        value="{{ form['description'] or '' }}"
                    >
                </div>

                <button type="submit" class="btn-submit">Save Changes</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">← Back to profile</a>
        </p>
    </div>
</section>
{% endblock %}
